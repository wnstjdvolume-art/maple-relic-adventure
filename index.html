<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maple Relic Adventure</title>
<style>
  :root { --maple-orange: #ff9a3c; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:radial-gradient(circle at 50% 30%, #3a2f47, #1a1422);
    font-family:"Segoe UI","Malgun Gothic",sans-serif; color:#fff; overflow:hidden; user-select:none; }
  #wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; }
  #topbar { width:800px; max-width:96vw; display:flex; align-items:center; justify-content:space-between; }
  #title { font-size:22px; font-weight:800; } #title span { color:var(--maple-orange); }
  #topbtns { display:flex; gap:8px; }
  #langBtn, #muteBtn { background:rgba(0,0,0,.35); color:#fff; border:1px solid rgba(255,255,255,.25); border-radius:8px; padding:5px 12px; font-size:13px; cursor:pointer; }
  #langBtn:hover, #muteBtn:hover { border-color:var(--maple-orange); }
  #hud { width:800px; max-width:96vw; display:flex; align-items:center; gap:12px; font-size:14px; flex-wrap:wrap; }
  #hud .box { background:rgba(0,0,0,.35); padding:6px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); }
  #hpbar,#mpbar { width:120px; height:13px; background:#3a2020; border-radius:7px; overflow:hidden; border:1px solid rgba(255,255,255,.2); display:inline-block; vertical-align:middle; }
  #mpbar { background:#1f2a3a; }
  #hpfill { height:100%; background:linear-gradient(90deg,#ff5a5a,#ff9a9a); transition:width .2s; }
  #mpfill { height:100%; background:linear-gradient(90deg,#4aa3ff,#9fd0ff); transition:width .2s; }
  #relics { color:var(--maple-orange); font-weight:700; }
  canvas { background:#15101d; border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.5); border:2px solid rgba(255,154,60,.4); max-width:100%; height:auto; touch-action:none; }
  #hint { font-size:12px; opacity:.7; }
  /* 모바일 터치 컨트롤 */
  #touchControls { display:none; width:800px; max-width:96vw; justify-content:space-between; align-items:flex-end; margin-top:4px; }
  #dpad { display:grid; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(3,52px); gap:4px; }
  #dpad .tbtn:nth-child(1){ grid-column:2; grid-row:1; }
  #dpad .tbtn:nth-child(2){ grid-column:1; grid-row:2; }
  #dpad .tbtn:nth-child(3){ grid-column:2; grid-row:2; opacity:.25; }
  #dpad .tbtn:nth-child(4){ grid-column:3; grid-row:2; }
  #dpad .tbtn:nth-child(5){ grid-column:2; grid-row:3; }
  #abbtns { display:flex; gap:12px; align-items:center; }
  .tbtn { background:rgba(255,154,60,.22); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:12px;
    font-size:20px; font-weight:700; width:52px; height:52px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; user-select:none; -webkit-user-select:none; touch-action:none; }
  .tbtn:active { background:var(--maple-orange); color:#2b2233; }
  .tbtn.big { width:72px; height:72px; font-size:24px; border-radius:50%; background:rgba(124,200,120,.28); }
  .tbtn.b { width:56px; height:56px; border-radius:50%; }
  /* 터치 기기 또는 좁은 화면에서만 컨트롤 표시 */
  @media (pointer: coarse), (max-width: 860px) { #touchControls { display:flex; } #hint { display:none; } }
  .center-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(10,6,18,.88); text-align:center; gap:14px; padding:20px;}
  .center-overlay h1 { font-size:36px; margin:0; }
  .center-overlay p { font-size:15px; opacity:.85; margin:0; max-width:560px; line-height:1.7; white-space:pre-line; }
  .btn { margin-top:8px; padding:12px 28px; font-size:16px; font-weight:700; cursor:pointer; background:var(--maple-orange); color:#2b2233; border:none; border-radius:10px; box-shadow:0 6px 0 #c76e1d; }
  .btn:active { transform:translateY(3px); box-shadow:0 3px 0 #c76e1d; }
  .hidden { display:none !important; }
  kbd { background:#2b2233; border:1px solid #555; border-radius:4px; padding:1px 6px; font-size:12px; }
  #classCards { display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
  .ccard { width:200px; background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; cursor:pointer; transition:.12s; }
  .ccard:hover { border-color:var(--maple-orange); transform:translateY(-4px); background:rgba(255,154,60,.12); }
  .ccard h3 { margin:6px 0 8px; font-size:20px; }
  .ccard .emoji { font-size:40px; }
  .ccard ul { text-align:left; font-size:12.5px; opacity:.85; padding-left:18px; margin:8px 0 0; line-height:1.6; }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div id="title">🍁 Maple <span>Relic</span> Adventure</div>
    <div id="topbtns">
      <button id="muteBtn" title="Sound on/off">🔊</button>
      <button id="langBtn">한국어</button>
    </div>
  </div>
  <div id="hud">
    <div class="box" id="classbox">-</div>
    <div class="box">Lv <span id="lvtxt">1</span></div>
    <div class="box">HP <div id="hpbar"><div id="hpfill"></div></div> <span id="hptxt"></span></div>
    <div class="box">MP <div id="mpbar"><div id="mpfill"></div></div></div>
    <div class="box"><span id="lblPot">Potions</span> <span id="pottxt">4</span></div>
    <div class="box"><span id="lblRelic">Relics</span> <span id="relics">0 / 5</span></div>
    <div class="box" id="msg"></div>
  </div>
  <canvas id="game" width="800" height="544"></canvas>
  <div id="touchControls">
    <div id="dpad">
      <button class="tbtn" data-k="arrowup">▲</button>
      <button class="tbtn" data-k="arrowleft">◀</button>
      <button class="tbtn">●</button>
      <button class="tbtn" data-k="arrowright">▶</button>
      <button class="tbtn" data-k="arrowdown">▼</button>
    </div>
    <div id="abbtns">
      <button class="tbtn b" data-k="escape">B</button>
      <button class="tbtn big" data-k="enter">A</button>
    </div>
  </div>
  <div id="hint"></div>
</div>

<div id="startScreen" class="center-overlay">
  <h1>🍁 Maple Relic Adventure</h1>
  <p id="startP1"></p>
  <p id="startP2" style="font-size:13px;opacity:.7"></p>
  <button class="btn" id="startBtn"></button>
</div>

<div id="classScreen" class="center-overlay hidden">

  <div id="classCards"></div>
</div>

<div id="floorScreen" class="center-overlay hidden">
  <h1 id="floorTitle"></h1>
  <p id="floorText"></p>
  <button class="btn" id="floorBtn"></button>
</div>

<div id="endScreen" class="center-overlay hidden">

  <button class="btn" id="retryBtn"></button>

function makeWorld(floorIdx){
  const floor=FLOORS[floorIdx], map=floor.map;
  const walls=[], relics=[], monsters=[]; let portal=null, start=null;
  const pool=floor.pool, off=Math.floor(Math.random()*pool.length); let spawnIdx=0;
  for(let r=0;r<map.length;r++) for(let c=0;c<map[r].length;c++){
    const ch=map[r][c], x=c*TILE, y=r*TILE;
    if(ch==="#") walls.push({x,y});
    else if(ch==="P") start={x:x+TILE/2,y:y+TILE/2};
    else if(ch==="R") relics.push({x:x+TILE/2,y:y+TILE/2,got:false,t:Math.random()*6});
    else if(ch==="M"){ const key=pool[(spawnIdx+off)%pool.length]; spawnIdx++; monsters.push(makeFieldMon(x+TILE/2,y+TILE/2,key)); }
    else if(ch==="X") portal={x:x+TILE/2,y:y+TILE/2,open:false,t:0};
  }
  return { floorIdx, map, short:floor.short, bossKey:floor.boss,
    walls, relics, monsters, portal, px:start.x, py:start.y, pr:11, dir:{x:0,y:1},
    collected:0, encounterCd:0, bossSpawned:false, bossDefeated:false };
}
function makeFieldMon(x,y,key){ const t=MONSTER_TYPES[key]; return { key, x, y, r:t.r, wob:Math.random()*6.28, defeated:false, homeX:x, homeY:y }; }

function isWall(cx,cy,cr){ for(const w of game.walls){ const nx=Math.max(w.x,Math.min(cx,w.x+TILE)), ny=Math.max(w.y,Math.min(cy,w.y+TILE)); const dx=cx-nx,dy=cy-ny; if(dx*dx+dy*dy<cr*cr) return true; } return false; }
function moveEnt(e,dx,dy,cr){ if(!isWall(e.x+dx,e.y,cr)) e.x+=dx; if(!isWall(e.x,e.y+dy,cr)) e.y+=dy; }

// ---------- 사운드 (Web Audio 합성 — 외부 음원 미사용, IP 안전) ----------
const MUSIC = {
  field:  { mel:[440,0,523,0,587,0,523,0,440,0,392,0,440,0,0,0], bass:[110,110,147,98] },
  battle: { mel:[523,0,494,523,587,0,494,440,523,0,587,659,587,523,494,0], bass:[131,131,98,117] },
  boss:   { mel:[392,466,523,466,392,349,392,466,523,587,523,466,392,349,330,349], bass:[98,98,87,104] },
};
const Audio8 = {
  ctx:null, master:null, muted:false, timer:null, step:0, mode:"field",
  init(){ if(this.ctx) return; const AC=(typeof window!=="undefined")&&(window.AudioContext||window.webkitAudioContext); if(!AC) return;
    try{ this.ctx=new AC(); }catch(e){ return; }
    this.master=this.ctx.createGain(); this.master.gain.value=this.muted?0:0.4; this.master.connect(this.ctx.destination); this.loop(); },
  resume(){ if(this.ctx && this.ctx.state==="suspended"){ try{ this.ctx.resume(); }catch(e){} } },
  tone(freq,dur,type,vol,when){ if(!this.ctx||freq<=0) return; const t=when||this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||"square"; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.03); },
  slide(f1,f2,dur,type,vol){ if(!this.ctx) return; const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||"sawtooth"; o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.03); },
  noise(dur,vol){ if(!this.ctx) return; const t=this.ctx.currentTime, n=Math.floor(this.ctx.sampleRate*dur);
    const buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
    const s=this.ctx.createBufferSource(); s.buffer=buf; const g=this.ctx.createGain(); g.gain.value=vol||0.2;
    s.connect(g); g.connect(this.master); s.start(t); },
  sfx(type){ if(!this.ctx) return; const now=this.ctx.currentTime;
    switch(type){
      case "cursor": this.tone(520,0.05,"square",0.07); break;
      case "select": this.tone(680,0.07,"square",0.11); this.tone(900,0.08,"square",0.09,now+0.05); break;
      case "hit": this.noise(0.1,0.16); this.tone(180,0.12,"square",0.11); break;
      case "crit": this.noise(0.16,0.2); this.slide(320,120,0.18,"sawtooth",0.18); break;
      case "skill": this.slide(400,900,0.18,"triangle",0.15); break;
      case "heal": this.tone(660,0.1,"sine",0.15); this.tone(880,0.14,"sine",0.15,now+0.08); break;
      case "miss": this.tone(200,0.12,"sine",0.09); break;
      case "hurt": this.slide(260,90,0.22,"square",0.17); break;
      case "pickup": this.tone(880,0.08,"square",0.13); this.tone(1320,0.12,"square",0.13,now+0.07); break;
      case "level": [523,659,784,1047].forEach((f,i)=>this.tone(f,0.16,"triangle",0.15,now+i*0.09)); break;
      case "encounter": this.slide(200,820,0.25,"sawtooth",0.13); break;
      case "boss": this.slide(120,55,0.5,"sawtooth",0.2); this.tone(110,0.5,"square",0.13); break;
      case "win": [523,659,784,1047,1319].forEach((f,i)=>this.tone(f,0.2,"triangle",0.17,now+i*0.12)); break;
      case "lose": [392,330,262,196].forEach((f,i)=>this.tone(f,0.28,"sine",0.15,now+i*0.16)); break;
    } },
  setMode(m){ this.mode=m; },
  stepDur(){ return this.mode==="boss"?135:this.mode==="battle"?170:260; },
  loop(){ const self=this; (function tick(){ if(!self.ctx) return; self.playStep(); self.timer=setTimeout(tick, self.stepDur()); })(); },
  playStep(){ if(!this.ctx || this.muted){ this.step++; return; }
    const P=MUSIC[this.mode]||MUSIC.field, m=P.mel[this.step % P.mel.length];
    if(m) this.tone(m, this.stepDur()/1000*0.9, "triangle", 0.06);
    if(this.step%4===0) this.tone(P.bass[Math.floor(this.step/4)%P.bass.length], this.stepDur()/1000*3.4, "sine", 0.11);
    this.step++; },
  toggleMute(){ this.muted=!this.muted; if(this.master) this.master.gain.value=this.muted?0:0.4; try{ localStorage.setItem("mra_mute", this.muted?"1":"0"); }catch(e){} return this.muted; },
};
try{ if(localStorage.getItem("mra_mute")==="1") Audio8.muted=true; }catch(e){}

// ---------- 필드 ----------
function updateOverworld(){
  const g=game; let ix=0,iy=0;
  if(keys["a"]||keys["arrowleft"]) ix-=1; if(keys["d"]||keys["arrowright"]) ix+=1;
  if(keys["w"]||keys["arrowup"]) iy-=1; if(keys["s"]||keys["arrowdown"]) iy+=1;
  const spd=2.4;
  if(ix||iy){ const l=Math.hypot(ix,iy); g.dir={x:ix/l,y:iy/l};
    if(!isWall(g.px+g.dir.x*spd,g.py,g.pr)) g.px+=g.dir.x*spd;
    if(!isWall(g.px,g.py+g.dir.y*spd,g.pr)) g.py+=g.dir.y*spd; }
  if(g.encounterCd>0) g.encounterCd--;
  for(const m of g.monsters){ if(m.defeated) continue; m.wob+=0.05;
    const dx=g.px-m.x, dy=g.py-m.y, dist=Math.hypot(dx,dy);
    const isBoss=MONSTER_TYPES[m.key].kind==="boss"; const chaseR=isBoss?160:110; const sp=isBoss?1.1:0.9;
    if(dist<chaseR) moveEnt(m,(dx/(dist||1))*sp,(dy/(dist||1))*sp,m.r);
    else { const hx=m.homeX-m.x, hy=m.homeY-m.y; moveEnt(m,Math.cos(m.wob)*0.5+hx*0.005,Math.sin(m.wob*1.3)*0.5+hy*0.005,m.r); }
    if(dist<m.r+g.pr-2 && g.encounterCd===0){ startBattle(m); return; }
  }
  for(const rel of g.relics){ if(rel.got) continue; rel.t+=0.08;
    if(Math.hypot(g.px-rel.x,g.py-rel.y)<g.pr+11){ rel.got=true; g.collected++; Audio8.sfx("pickup");
      spawn(rel.x,rel.y,"#ff9a3c",16); setMsg(t("relicGet")(g.collected));
      if(g.collected>=TOTAL_RELICS && !g.bossSpawned) spawnBoss(); } }
  if(g.portal){ g.portal.t+=0.1;
    if(Math.hypot(g.px-g.portal.x,g.py-g.portal.y)<g.pr+14){
      if(g.portal.open){ if(g.floorIdx<FLOORS.length-1) clearFloor(); else endGame(true); }
      else if(g.bossSpawned && !g.bossDefeated) setMsg(t("beatBossFirst")(monName(g.bossKey))); } }
  for(const pt of particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vx*=0.92; pt.vy*=0.92; pt.life--; }
  particles=particles.filter(p=>p.life>0);
}

function spawnBoss(){
  game.bossSpawned=true; const key=game.bossKey, mt=MONSTER_TYPES[key];
  const px=game.portal.x, py=game.portal.y; let bx=px, by=py-TILE*2;
  const cands=[[-2,0],[0,-2],[-2,-1],[-3,0],[0,-3],[-2,-2],[2,0],[0,2]];
  for(const [dc,dr] of cands){ const cx=px+dc*TILE, cy=py+dr*TILE; if(!isWall(cx,cy,mt.r)){ bx=cx; by=cy; break; } }
  const boss=makeFieldMon(bx,by,key); boss.r=mt.r; game.monsters.push(boss);
  setMsg(t("bossAppear")(monName(key))); spawn(bx,by,mt.color,32); Audio8.sfx("boss");
}

// ---------- 배틀 전환 ----------
function startBattle(fieldMon){ transition={t:0,mon:fieldMon}; state="transition"; Audio8.sfx("encounter"); }
function beginBattleScene(fieldMon){
  const mt=MONSTER_TYPES[fieldMon.key];
  battle={ fieldMon, enemy:{ key:fieldMon.key, maxHp:mt.maxHp, hp:mt.maxHp, atk:mt.atk, exp:mt.exp, kind:mt.kind, r:mt.r, status:{poison:0} },
    phase:"msg", menuIndex:0, skillIndex:0, msgQueue:[], onMsgDone:null, shake:0, enemyFlash:0, playerFlash:0, anim:0, turn:0 };
  const isBoss=mt.kind==="boss"; const nm=monName(fieldMon.key);
  Audio8.setMode(isBoss?"boss":"battle");
  pushMsgs(isBoss?[t("bossBlock")(nm), t("bossAura")]:[t("wildAppear")(nm)], beginPlayerTurn);

// ---------- 메시지 ----------
function pushMsgs(arr,done){ battle.msgQueue=arr.slice(); battle.onMsgDone=done; battle.phase="msg"; }
function advanceMsg(){ battle.msgQueue.shift(); if(battle.msgQueue.length===0){ const cb=battle.onMsgDone; battle.onMsgDone=null; if(cb) cb(); } }
function rint(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }

// ---------- 턴 흐름 ----------
function beginPlayerTurn(){
  battle.turn++;
  if(player.status.poison>0){ const d=4; player.hp=Math.max(0,player.hp-d); player.status.poison--; battle.playerFlash=8;
    pushMsgs([t("playerPoison")(d,player.status.poison)], ()=>{ if(player.hp<=0) loseBattle(); else showMenu(); }); }
  else showMenu();
}
function showMenu(){ battle.phase="menu"; battle.menuIndex=0; }
function afterPlayerAction(){ if(battle.enemy.hp<=0){ winBattle(); return; } beginEnemyTurn(); }
function beginEnemyTurn(){
  const e=battle.enemy;
  if(e.status.poison>0){ const d=6; e.hp=Math.max(0,e.hp-d); e.status.poison--; battle.enemyFlash=8;
    pushMsgs([t("enemyPoison")(monName(e.key),d,e.status.poison)], ()=>{ if(e.hp<=0) winBattle(); else enemyAct(); }); }
  else enemyAct();
}
function enemyAct(){
  const e=battle.enemy; let act="atk", mul=1, applyPoison=false;
  if(e.kind==="boss"){ const pats=BOSS_PATTERNS[e.key]||BOSS_PATTERNS.mushmom; const pat=pats[battle.turn%pats.length];
    act=pat.act; mul=pat.mul; if(pat.poison) applyPoison=true; }
  else if(e.kind==="heavy" && Math.random()<0.30){ act="heavy"; mul=1.5; }
  else if(e.kind==="poison" && Math.random()<0.4){ act="pspore"; mul=0.9; applyPoison=true; }
  let dmg=Math.round((e.atk+rint(0,2))*mul);
  player.hp=Math.max(0,player.hp-dmg); battle.playerFlash=10; battle.shake=mul>1.3?14:8; Audio8.sfx("hurt");
  let lines=[t("enemyHit")(monName(e.key),dmg,act)];
  if(applyPoison && player.status.poison<=0 && Math.random()<0.8){ player.status.poison=4; lines.push(t("playerPoisoned")); }
  pushMsgs(lines, ()=>{ if(player.hp<=0) loseBattle(); else beginPlayerTurn(); });
}

// ---------- 배틀 입력 ----------
function handleBattleKey(k){
  if(!battle) return;
  if(battle.phase==="msg"){ if(k===" "||k==="enter") advanceMsg(); return; }
  if(battle.phase==="menu"){
    if(k==="arrowup"||k==="w"){ battle.menuIndex=(battle.menuIndex+3)%4; Audio8.sfx("cursor"); }
    else if(k==="arrowdown"||k==="s"){ battle.menuIndex=(battle.menuIndex+1)%4; Audio8.sfx("cursor"); }
    else if(k===" "||k==="enter"){ Audio8.sfx("select"); chooseMain(battle.menuIndex); }
    else if(k>="1"&&k<="4"){ battle.menuIndex=+k-1; Audio8.sfx("select"); chooseMain(battle.menuIndex); }
  } else if(battle.phase==="skillmenu"){
    const n=CLASSES[player.cls].skills.length;
    if(k==="arrowup"||k==="w"){ battle.skillIndex=(battle.skillIndex+n)%(n+1); Audio8.sfx("cursor"); }
    else if(k==="arrowdown"||k==="s"){ battle.skillIndex=(battle.skillIndex+1)%(n+1); Audio8.sfx("cursor"); }
    else if(k==="escape"||k==="backspace"){ battle.phase="menu"; Audio8.sfx("cursor"); }
    else if(k===" "||k==="enter"){ if(battle.skillIndex===n){ battle.phase="menu"; Audio8.sfx("cursor"); } else { Audio8.sfx("select"); useSkill(battle.skillIndex); } }
  }
}
function chooseMain(i){
  const e=battle.enemy, enm=monName(e.key);
  if(i===0){ const {dmg,crit}=calcHit(pAtk(),0.95);
    if(dmg>0){ Audio8.sfx(crit?"crit":"hit"); e.hp=Math.max(0,e.hp-dmg); battle.enemyFlash=10; battle.shake=crit?14:8; spawnB(560,150,MONSTER_TYPES[e.key].color,crit?16:8);
      pushMsgs([t("atkMsg")(enm,dmg,crit)], afterPlayerAction); }
    else { Audio8.sfx("miss"); pushMsgs([t("atkMiss")], afterPlayerAction); }
  } else if(i===1){ battle.phase="skillmenu"; battle.skillIndex=0; }
  else if(i===2){ if(player.potions<=0){ Audio8.sfx("miss"); pushMsgs([t("noPotion")], showMenu); return; }
    player.potions--; Audio8.sfx("heal"); const b=player.hp; player.hp=Math.min(player.maxHp,player.hp+42);
    pushMsgs([t("potionMsg")(player.hp-b)], afterPlayerAction);
  } else if(i===3){ if(e.kind==="boss"){ Audio8.sfx("miss"); pushMsgs([t("cantRunBoss")], showMenu); return; }
    if(Math.random()<0.5){ Audio8.sfx("select"); pushMsgs([t("ranAway")], exitBattle); } else { Audio8.sfx("miss"); pushMsgs([t("cantRun")], beginEnemyTurn); }
  }
}
function calcHit(atk,acc,mul){ mul=mul||1; if(Math.random()>acc) return {dmg:0,crit:false};
  const crit=Math.random()<player.crit; let d=Math.round((atk+rint(0,3))*mul*(crit?1.6:1)); return {dmg:Math.max(1,d),crit}; }
function useSkill(idx){
  const sk=CLASSES[player.cls].skills[idx], e=battle.enemy, skn=skName(sk), enm=monName(e.key);
  if(player.mp<sk.mp){ Audio8.sfx("miss"); pushMsgs([t("noMp")], ()=>{ battle.phase="menu"; }); return; }
  player.mp-=sk.mp;
  if(sk.kind==="heal"){ Audio8.sfx("heal"); const b=player.hp; player.hp=Math.min(player.maxHp,player.hp+sk.heal);
    spawnB(220,330,"#7CFC00",14); pushMsgs([t("skillHeal")(skn,player.hp-b)], afterPlayerAction); return; }
  if(sk.kind==="buff"){ Audio8.sfx("skill"); player.atkBuff+=sk.atk; pushMsgs([t("skillBuff")(skn,sk.atk,player.atkBuff)], afterPlayerAction); return; }
  let total=0, anyCrit=false, hitCount=0;
  for(let h=0;h<sk.hits;h++){ const {dmg,crit}=calcHit(pAtk(),sk.acc,sk.mul); if(dmg>0){ e.hp=Math.max(0,e.hp-dmg); total+=dmg; hitCount++; if(crit) anyCrit=true; } }
  Audio8.sfx(hitCount===0?"miss":(anyCrit?"crit":"skill"));
  battle.enemyFlash=12; battle.shake=anyCrit?16:12; spawnB(560,150,MONSTER_TYPES[e.key].color,12);
  let lines=[];
  if(hitCount===0) lines.push(t("skillAllMiss")(skn));
  else if(sk.hits>1) lines.push(t("skillMulti")(skn,hitCount,total,anyCrit));
  else lines.push(t("skillSingle")(skn,enm,total,anyCrit));
  if(sk.poison && e.hp>0 && e.status.poison<=0){ e.status.poison=4; lines.push(t("enemyPoisoned")(enm)); }
  pushMsgs(lines, afterPlayerAction);
}
function winBattle(){
  const e=battle.enemy; battle.fieldMon.defeated=true; player.exp+=e.exp; player.atkBuff=0;
  let lines=[t("defeated")(monName(e.key)), t("expGain")(e.exp)], leveled=false;
  while(player.exp>=player.expNext){ player.exp-=player.expNext; player.lv++; player.expNext=Math.round(player.expNext*1.5);
    player.maxHp+=11; player.hp=player.maxHp; player.atk+=2; player.maxMp+=3; player.mp=player.maxMp;
    lines.push(t("levelUp")(player.lv)); leveled=true; }
  if(leveled) Audio8.sfx("level");
  if(e.kind==="boss"){ game.bossDefeated=true; game.portal.open=true;
    lines.push(game.floorIdx<FLOORS.length-1 ? t("portalDeeper") : t("portalEscape")); }
  pushMsgs(lines, exitBattle);
}
function loseBattle(){ pushMsgs([t("loseLine1"), t("loseLine2")], ()=>endGame(false)); }
function exitBattle(){ state="overworld"; game.encounterCd=45; player.status.poison=0; battle=null; Audio8.setMode("field"); }

// ---------- 렌더: 필드 ----------
function drawOverworld(){
  ctx.fillStyle="#1d1729"; ctx.fillRect(0,0,canvas.width,canvas.height);
  const map=game.map;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ if(map[r]&&map[r][c]!=="#"){ ctx.fillStyle=((r+c)%2===0)?"#241c33":"#211a2e"; ctx.fillRect(c*TILE,r*TILE,TILE,TILE); } }
  for(const w of game.walls){ ctx.fillStyle="#3b2f52"; ctx.fillRect(w.x,w.y,TILE,TILE); ctx.fillStyle="#4d3f68"; ctx.fillRect(w.x,w.y,TILE,5); }
  for(const rel of game.relics){ if(rel.got) continue; const bob=Math.sin(rel.t)*3;
    ctx.save(); ctx.translate(rel.x,rel.y+bob); ctx.shadowColor="#ff9a3c"; ctx.shadowBlur=14; ctx.fillStyle="#ffcf6b";
    ctx.beginPath(); for(let i=0;i<5;i++){ const a=-Math.PI/2+i*2*Math.PI/5; ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9); const a2=a+Math.PI/5; ctx.lineTo(Math.cos(a2)*4,Math.sin(a2)*4);} ctx.closePath(); ctx.fill(); ctx.restore(); }
  if(game.portal){ const pt=game.portal; ctx.save(); ctx.translate(pt.x,pt.y);
    if(pt.open){ for(let i=0;i<3;i++){ ctx.beginPath(); ctx.strokeStyle=`rgba(120,200,255,${0.7-i*0.2})`; ctx.lineWidth=3; ctx.arc(0,0,12+i*5+Math.sin(pt.t+i)*3,0,6.28); ctx.stroke(); } ctx.fillStyle="rgba(150,220,255,.5)"; ctx.beginPath(); ctx.arc(0,0,10,0,6.28); ctx.fill(); }
    else { ctx.fillStyle="#444"; ctx.beginPath(); ctx.arc(0,0,12,0,6.28); ctx.fill(); ctx.fillStyle="#888"; ctx.font="14px sans-serif"; ctx.textAlign="center"; ctx.fillText("🔒",0,5); } ctx.restore(); }
  for(const m of game.monsters){ if(m.defeated) continue; const mt=MONSTER_TYPES[m.key];
    ctx.save(); ctx.translate(m.x,m.y+Math.sin(m.wob)*1.5);
    if(mt.kind==="boss"){ ctx.shadowColor="#ff4fd8"; ctx.shadowBlur=16; }
    ctx.fillStyle=mt.color; ctx.beginPath(); ctx.arc(0,0,m.r,0,6.28); ctx.fill();
    ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(-m.r*0.35,-3,2,0,6.28); ctx.arc(m.r*0.35,-3,2,0,6.28); ctx.fill();
    ctx.restore(); }
  drawHero(game.px,game.py,game.pr,game.dir,player.cls);
  for(const pt of particles){ ctx.globalAlpha=Math.max(0,pt.life/35); ctx.fillStyle=pt.color; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
}
function drawHero(x,y,r,dir,clsKey){
  const c=CLASSES[clsKey]||CLASSES.warrior;
  ctx.save(); ctx.translate(x,y);
  if(c.weapon==="sword"){ ctx.strokeStyle="#ddd"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(r,2); ctx.lineTo(r+8,-6); ctx.stroke(); }
  if(c.weapon==="staff"){ ctx.strokeStyle="#caa15a"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(r-2,4); ctx.lineTo(r+6,-8); ctx.stroke(); ctx.fillStyle="#9fd0ff"; ctx.beginPath(); ctx.arc(r+6,-9,2.5,0,6.28); ctx.fill(); }
  if(c.weapon==="bow"){ ctx.strokeStyle="#2faf63"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r+3,-1,7,-1.2,1.2); ctx.stroke(); }
  ctx.fillStyle=c.body; ctx.beginPath(); ctx.arc(0,0,r,0,6.28); ctx.fill();
  ctx.fillStyle=c.hat; ctx.beginPath(); ctx.arc(0,-4,r,Math.PI,0); ctx.fill(); ctx.fillRect(-r-2,-5,(r+2)*2,3);
  const dx=dir?dir.x:0, dy=dir?dir.y:1;
  ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(dx*3-3,dy*3+1,1.6,0,6.28); ctx.arc(dx*3+3,dy*3+1,1.6,0,6.28); ctx.fill();
  ctx.restore();
}

// ---------- 전환 ----------
function updateTransition(){ transition.t+=1; if(transition.t>=34) beginBattleScene(transition.mon); }
function drawTransition(){ drawOverworld(); const p=transition.t/34; ctx.fillStyle="#0a0612";
  const bars=8, bh=canvas.height/bars; for(let i=0;i<bars;i++){ const w=canvas.width*Math.min(1,p*1.4-(i%2)*0.2); if(i%2===0) ctx.fillRect(0,i*bh,w,bh); else ctx.fillRect(canvas.width-w,i*bh,w,bh); } }

// ---------- 렌더: 배틀 ----------
function updateBattle(){ if(battle.shake>0) battle.shake--; if(battle.enemyFlash>0) battle.enemyFlash--; if(battle.playerFlash>0) battle.playerFlash--; battle.anim+=0.08; }
function drawBattle(){
  const sx=battle.shake>0?(Math.random()*2-1)*battle.shake*0.5:0, sy=battle.shake>0?(Math.random()*2-1)*battle.shake*0.5:0;
  ctx.save(); ctx.translate(sx,sy);
  const grd=ctx.createLinearGradient(0,0,0,canvas.height); grd.addColorStop(0,"#2e2742"); grd.addColorStop(1,"#181225");
  ctx.fillStyle=grd; ctx.fillRect(-20,-20,canvas.width+40,canvas.height+40);
  ctx.fillStyle="rgba(255,255,255,.05)"; ctx.beginPath(); ctx.ellipse(560,175,120,30,0,0,6.28); ctx.fill(); ctx.beginPath(); ctx.ellipse(220,365,135,34,0,0,6.28); ctx.fill();
  const e=battle.enemy, isBoss=e.kind==="boss"; const er=isBoss?60:42;
  ctx.save(); ctx.translate(560,150+Math.sin(battle.anim)*4);
  if(isBoss){ ctx.shadowColor="#ff4fd8"; ctx.shadowBlur=24; }
  ctx.fillStyle=battle.enemyFlash>0?"#fff":MONSTER_TYPES[e.key].color; ctx.beginPath(); ctx.arc(0,0,er,0,6.28); ctx.fill();
  ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(-er*0.33,-er*0.18,er*0.14,0,6.28); ctx.arc(er*0.33,-er*0.18,er*0.14,0,6.28); ctx.fill();
  ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(-er*0.30,-er*0.22,er*0.05,0,6.28); ctx.arc(er*0.38,-er*0.22,er*0.05,0,6.28); ctx.fill();
  if(e.status.poison>0){ ctx.fillStyle="rgba(120,220,80,.5)"; for(let i=0;i<5;i++){ ctx.beginPath(); ctx.arc(Math.cos(battle.anim+i)*er*0.7,Math.sin(battle.anim*1.3+i)*er*0.6,3,0,6.28); ctx.fill(); } }
  ctx.restore();
  drawPlate(440,60,monName(e.key)+(isBoss?" 👑":""),e.hp,e.maxHp,false,e.status.poison>0);
  ctx.save(); ctx.translate(220,330); ctx.scale(2.6,2.6); drawHero(0,0,12,{x:0,y:-1},player.cls);
  if(battle.playerFlash>0){ ctx.globalAlpha=0.5; ctx.fillStyle="#f55"; ctx.beginPath(); ctx.arc(0,0,14,0,6.28); ctx.fill(); ctx.globalAlpha=1; } ctx.restore();
  drawPlate(360,350,`${playerName()} Lv.${player.lv}`,player.hp,player.maxHp,true,player.status.poison>0);
  ctx.restore();
  drawBattleBox();
}
function drawPlate(x,y,name,hp,maxHp,showNums,poisoned){
  ctx.save(); ctx.fillStyle="rgba(0,0,0,.55)"; roundRect(x,y,300,56,10); ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.2)"; ctx.lineWidth=1; roundRect(x,y,300,56,10); ctx.stroke();
  ctx.fillStyle="#fff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.textAlign="left"; ctx.fillText(name,x+14,y+24);
  if(poisoned){ ctx.fillStyle="#8de060"; ctx.font="12px sans-serif"; ctx.fillText(t("poisonTag"),x+14,y+50); }
  const bx=x+14,by=y+32,bw=272,bh=10; ctx.fillStyle="#3a1f1f"; roundRect(bx,by,bw,bh,5); ctx.fill();
  const ratio=Math.max(0,hp/maxHp), col=ratio>0.5?"#5fdb6b":ratio>0.2?"#ffd24a":"#ff5a5a";
  ctx.fillStyle=col; roundRect(bx,by,bw*ratio,bh,5); ctx.fill();
  if(showNums){ ctx.fillStyle="#ddd"; ctx.font="11px sans-serif"; ctx.textAlign="right"; ctx.fillText(`${hp}/${maxHp}`,x+286,y+22); }
  ctx.restore();
}
function drawBattleBox(){
  const bx=20,by=canvas.height-130,bw=canvas.width-40,bh=110;
  ctx.fillStyle="rgba(10,8,20,.92)"; roundRect(bx,by,bw,bh,12); ctx.fill();
  ctx.strokeStyle="#ff9a3c"; ctx.lineWidth=2; roundRect(bx,by,bw,bh,12); ctx.stroke();
  if(battle.phase==="msg"){ ctx.fillStyle="#fff"; ctx.font="18px 'Malgun Gothic',sans-serif"; ctx.textAlign="left";
    wrapText(battle.msgQueue[0]||"",bx+22,by+38,bw-180,26);
    ctx.fillStyle="#ff9a3c"; ctx.font="12px sans-serif"; ctx.textAlign="right"; ctx.fillText("▼ Enter/Space",bx+bw-16,by+bh-14); return; }
  ctx.textAlign="left"; ctx.fillStyle="#9fd"; ctx.font="13px sans-serif";
  ctx.fillText(`HP ${player.hp}/${player.maxHp}`,bx+22,by+34);
  ctx.fillText(`MP ${player.mp}/${player.maxMp}`,bx+22,by+56);
  ctx.fillText(`${t("potShort")} x${player.potions}`,bx+22,by+78);
  if(player.atkBuff>0){ ctx.fillStyle="#ffd24a"; ctx.fillText(t("atkBuff")(player.atkBuff),bx+22,by+98); }
  if(battle.phase==="menu"){
    ctx.fillStyle="#aaa"; ctx.font="13px sans-serif"; ctx.fillText(t("whatDo"),bx+170,by+22);
    const labels=t("menuMain");
    for(let i=0;i<4;i++){ const col=i%2,row=Math.floor(i/2), mx=bx+170+col*230, my=by+44+row*38, sel=i===battle.menuIndex;
      if(sel){ ctx.fillStyle="rgba(255,154,60,.25)"; roundRect(mx-8,my-19,216,30,6); ctx.fill(); ctx.fillStyle="#ff9a3c"; ctx.font="bold 16px sans-serif"; ctx.fillText("▶",mx-28,my+3); }
      ctx.fillStyle=sel?"#fff":"#cfcfcf"; ctx.font=(sel?"bold ":"")+"16px 'Malgun Gothic',sans-serif"; ctx.fillText(labels[i],mx,my+3); }
  } else if(battle.phase==="skillmenu"){
    const skills=CLASSES[player.cls].skills;
    ctx.fillStyle="#aaa"; ctx.font="13px sans-serif"; ctx.fillText(t("skillPick"),bx+170,by+20);
    for(let i=0;i<skills.length;i++){ const s=skills[i], my=by+38+i*22, sel=i===battle.skillIndex, can=player.mp>=s.mp;
      if(sel){ ctx.fillStyle="rgba(255,154,60,.25)"; roundRect(bx+162,my-15,bw-184,22,5); ctx.fill(); ctx.fillStyle="#ff9a3c"; ctx.font="bold 14px sans-serif"; ctx.textAlign="left"; ctx.fillText("▶",bx+150,my+1); }
      ctx.fillStyle=can?(sel?"#fff":"#ddd"):"#777"; ctx.font=(sel?"bold ":"")+"14px 'Malgun Gothic',sans-serif"; ctx.textAlign="left";
      ctx.fillText(skName(s),bx+170,my+1);
      ctx.fillStyle=can?"#9fd0ff":"#a55"; ctx.font="12px sans-serif"; ctx.fillText(`MP ${s.mp}`,bx+360,my+1);
      ctx.fillStyle="#999"; ctx.fillText(skInfo(s),bx+430,my+1); }
    const bi=skills.length, my=by+38+bi*22, sel=battle.skillIndex===bi;
    if(sel){ ctx.fillStyle="#ff9a3c"; ctx.font="bold 14px sans-serif"; ctx.fillText("▶",bx+150,my+1); }
    ctx.fillStyle=sel?"#fff":"#cfcfcf"; ctx.font="14px sans-serif"; ctx.fillText(t("back"),bx+170,my+1);
  }
}

// ---------- 유틸 ----------
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wrapText(text,x,y,maxW,lh){ let line="",yy=y; for(const ch of text.split("")){ if(ctx.measureText(line+ch).width>maxW){ ctx.fillText(line,x,yy); line=ch; yy+=lh; } else line+=ch; } ctx.fillText(line,x,yy); }
function spawn(x,y,color,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=1+Math.random()*3; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*15,color,r:2+Math.random()*2}); } }
function spawnB(x,y,color,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=1+Math.random()*4; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:18+Math.random()*12,color,r:2+Math.random()*2}); } }
let msgTimer=0;
function setMsg(txt){ document.getElementById("msg").textContent=txt; msgTimer=220; }

// ---------- HUD ----------
function updateHud(){
  document.getElementById("classbox").textContent=playerName()+" · "+game.short;
  document.getElementById("lvtxt").textContent=player.lv;
  document.getElementById("hpfill").style.width=(player.hp/player.maxHp*100)+"%";
  document.getElementById("hptxt").textContent=`${player.hp}/${player.maxHp}`;
  document.getElementById("mpfill").style.width=(player.mp/player.maxMp*100)+"%";
  document.getElementById("pottxt").textContent=player.potions;
  document.getElementById("relics").textContent=`${game.collected} / ${TOTAL_RELICS}`;
  if(msgTimer>0){ msgTimer--; if(msgTimer===0){ const bn=monName(game.bossKey);
    document.getElementById("msg").textContent = game.bossDefeated ? t("goPortal") : (game.bossSpawned ? t("beatBoss")(bn) : t("relicGoal")); } }
}

// ---------- 루프 ----------
function loop(){
  if(state==="overworld"){ updateOverworld(); if(state==="overworld"){ drawOverworld(); updateHud(); } }
  else if(state==="transition"){ updateTransition(); drawTransition(); }
  else if(state==="battle"){ updateBattle(); drawBattle(); updateHud(); }
  requestAnimationFrame(loop);
}

// ---------- 화면 ----------
function showClassSelect(){
  document.getElementById("startScreen").classList.add("hidden");
  const cont=document.getElementById("classCards"); cont.innerHTML="";
  for(const key of Object.keys(CLASSES)){ const c=CLASSES[key];
    const div=document.createElement("div"); div.className="ccard";
    div.innerHTML=`<div class="emoji">${c.emoji}</div><h3>${clsName(c)}</h3>
      <div style="font-size:12px;opacity:.8">HP ${c.maxHp} · MP ${c.maxMp} · ATK ${c.atk}</div>
      <ul>${c.desc[LANG].map(d=>`<li>${d}</li>`).join("")}
      ${c.skills.map(s=>`<li style="color:#ffcf8b">${skName(s)} <span style="opacity:.6">(MP${s.mp})</span></li>`).join("")}</ul>`;
    div.onclick=()=>startGame(key); cont.appendChild(div); }
  document.getElementById("classScreen").classList.remove("hidden");
}
function startGame(classKey){
  Audio8.init(); Audio8.resume(); Audio8.setMode("field");
  player=newPlayer(classKey); game=makeWorld(0); battle=null; transition=null; particles=[]; state="overworld";
  document.getElementById("classScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("floorScreen").classList.add("hidden");
  setMsg(t("relicGoal"));
}
function clearFloor(){
  state="floorclear";
  player.hp=player.maxHp; player.mp=player.maxMp; player.potions=player.potions+2;
  document.getElementById("floorTitle").textContent=t("floorClearTitle")(game.short);
  document.getElementById("floorText").textContent=t("floorClearText")(floorName(game.floorIdx), floorName(game.floorIdx+1));
  document.getElementById("floorBtn").textContent=t("floorBtn")(FLOORS[game.floorIdx+1].short);
  document.getElementById("floorScreen").classList.remove("hidden");
}
function nextFloor(){
  const ni=game.floorIdx+1; game=makeWorld(ni); battle=null; transition=null; particles=[]; state="overworld";
  Audio8.setMode("field");
  document.getElementById("floorScreen").classList.add("hidden");
  setMsg(t("relicGoalDeep"));
}
function endGame(won){ state="over"; Audio8.setMode("field"); Audio8.sfx(won?"win":"lose"); const es=document.getElementById("endScreen");
  document.getElementById("endTitle").textContent=won?t("winTitle"):t("loseTitle");
  document.getElementById("endText").textContent=won ? t("winText")(playerName(),player.lv) : t("loseText")(game.short,game.collected);
  es.classList.remove("hidden");
}

// ---------- 정적 텍스트 적용 / 언어 토글 ----------
function applyStaticText(){
  document.documentElement.lang = LANG;
  document.getElementById("hint").textContent = t("hint");
  document.getElementById("lblPot").textContent = t("lblPot");
  document.getElementById("lblRelic").textContent = t("lblRelic");
  document.getElementById("startP1").textContent = t("startP1");
  document.getElementById("startP2").textContent = t("startP2");
  document.getElementById("startBtn").textContent = t("btnStart");
  document.getElementById("classTitle").textContent = t("classTitle");
  document.getElementById("retryBtn").textContent = t("btnRetry");
  document.getElementById("langBtn").textContent = t("langBtn");
  // 보이는 화면 갱신
  if(!document.getElementById("classScreen").classList.contains("hidden")) showClassSelect();
  if(state==="floorclear"){ clearFloorRefresh(); }
  if(state==="over" && player && game){ endGameRefresh(); }
}
function clearFloorRefresh(){
  document.getElementById("floorTitle").textContent=t("floorClearTitle")(game.short);
  document.getElementById("floorText").textContent=t("floorClearText")(floorName(game.floorIdx), floorName(game.floorIdx+1));
  document.getElementById("floorBtn").textContent=t("floorBtn")(FLOORS[game.floorIdx+1].short);
}
function endGameRefresh(){
  const won=game.bossDefeated && game.portal && game.portal.open && state==="over" && player.hp>0;
  document.getElementById("endTitle").textContent=won?t("winTitle"):t("loseTitle");
  document.getElementById("endText").textContent=won ? t("winText")(playerName(),player.lv) : t("loseText")(game.short,game.collected);
}
function toggleLang(){ LANG = (LANG==="en")?"ko":"en"; try{ localStorage.setItem("mra_lang",LANG); }catch(e){} applyStaticText(); }

document.getElementById("startBtn").onclick=()=>{ Audio8.init(); Audio8.resume(); showClassSelect(); };
document.getElementById("retryBtn").onclick=showClassSelect;
document.getElementById("floorBtn").onclick=nextFloor;
document.getElementById("langBtn").onclick=toggleLang;
document.getElementById("muteBtn").onclick=()=>{ Audio8.init(); const m=Audio8.toggleMute(); document.getElementById("muteBtn").textContent=m?"🔇":"🔊"; };
document.getElementById("muteBtn").textContent=Audio8.muted?"🔇":"🔊";

// 터치 컨트롤 → 키 입력 매핑
document.querySelectorAll("#touchControls .tbtn[data-k]").forEach(btn=>{
  const k=btn.getAttribute("data-k");
  const down=e=>{ e.preventDefault(); Audio8.init(); Audio8.resume(); pressKey(k); };
  const up=e=>{ e.preventDefault(); releaseKey(k); };
  btn.addEventListener("pointerdown",down);
  btn.addEventListener("pointerup",up);
  btn.addEventListener("pointerleave",up);
  btn.addEventListener("pointercancel",up);
});

applyStaticText();
loop();
</script>
</body>
